<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Full bleed amber background (maskable safe zone = inner 80%) -->
  <rect width="100" height="100" fill="#0c0c0f"/>
  <!-- Gauge background arc (scaled to fit safe zone, center at 50,55) -->
  <path d="M 23,65 A 27,27 0 0,1 77,65" fill="none" stroke="#2a2a38" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Gauge fill arc -->
  <path d="M 23,65 A 27,27 0 0,1 68,39" fill="none" stroke="#f59e0b" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Ticks -->
  <line x1="21" y1="66" x2="27" y2="59" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="50" y1="36" x2="50" y2="44" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="79" y1="66" x2="73" y2="59" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Needle -->
  <line x1="50" y1="65" x2="68" y2="39" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="50" cy="65" r="5.5" fill="#f59e0b"/>
  <circle cx="50" cy="65" r="2.2" fill="#0c0c0f"/>
  <!-- IQ label -->
  <text x="50" y="88" text-anchor="middle" font-family="Rajdhani,Arial,sans-serif" font-weight="700" font-size="14" fill="#f59e0b" letter-spacing="5">IQ</text>
</svg>
