<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0c0c0f"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="#141418"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.55"/>
  <!-- Gauge background arc -->
  <path d="M 18,62 A 32,32 0 0,1 82,62" fill="none" stroke="#2a2a38" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Gauge fill arc (~65%) -->
  <path d="M 18,62 A 32,32 0 0,1 65,34" fill="none" stroke="#f59e0b" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="16" y1="63" x2="23" y2="55" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="50" y1="27" x2="50" y2="36" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="84" y1="63" x2="77" y2="55" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Needle -->
  <line x1="50" y1="62" x2="65" y2="34" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="50" cy="62" r="6" fill="#f59e0b"/>
  <circle cx="50" cy="62" r="2.5" fill="#141418"/>
  <!-- IQ label -->
  <text x="50" y="86" text-anchor="middle" font-family="Rajdhani,Arial,sans-serif" font-weight="700" font-size="16" fill="#f59e0b" letter-spacing="5">IQ</text>
</svg>
